services:
  # Web Service - Google Maps Scraper
  - type: web
    name: google-maps-scraper
    runtime: docker
    repo: https://github.com/gosom/GMAP-Scrapper
    branch: main
    dockerfilePath: ./Dockerfile
    
    # Render will automatically assign PORT
    # The app reads it from environment via os.Getenv("PORT")
    
    # Health check configuration
    healthCheckPath: /health
    
    # Auto-deploy on push to main branch
    autoDeploy: true
    
    # Environment variables
    envVars:
      - key: DATA_FOLDER
        value: /data
      
      - key: CONCURRENCY
        value: 2
      
      - key: DISABLE_TELEMETRY
        value: 1
      
      # Optional: Uncomment if you want to use PostgreSQL
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: google-maps-db
      #     property: connectionString
    
    # Disk for persistent data (web mode uses SQLite)
    disk:
      name: scraper-data
      mountPath: /data
      sizeGB: 10
    
    # Resource allocation (adjust based on your needs)
    plan: starter  # Options: starter, standard, pro
    
    # Scaling configuration
    numInstances: 1
    
    # Build configuration
    buildFilter:
      paths:
        - "**/*.go"
        - "go.mod"
        - "go.sum"
        - "Dockerfile"
        - "web/**"

# Optional: PostgreSQL database (uncomment if needed)
# databases:
#   - name: google-maps-db
#     databaseName: gmaps
#     user: gmaps_user
#     plan: starter  # Options: starter, standard, pro
#     
#     # Initial SQL to run
#     # postgresMajorVersion: 15
