<tr>
    <td data-label="Job ID">{{.ID}}</td>
    <td data-label="Name">{{.Name}}</td>
    <td data-label="Date">{{.Date}}</td>
    <td data-label="Status">
        <span class="status-indicator status-{{.Status}}">{{.Status}}</span>
    </td>
    <td data-label="Actions">
        {{ if eq .Status "ok" }}
        <span class="btn-with-info">
            <a href="/download?id={{.ID}}" download class="button download-button">Download</a>
            <i class="info-icon action-info" data-tip="Download the scraped results for this job as a CSV file.">i</i>
        </span>
        {{ end }}
        <span class="btn-with-info">
            <button hx-delete="/delete?id={{.ID}}" hx-target="closest tr" hx-swap="outerHTML"
                hx-confirm="Are you sure you want to delete this job?" class="delete-button">Delete</button>
            <i class="info-icon action-info"
                data-tip="Permanently delete this job and its data. You will be asked to confirm before deletion.">i</i>
        </span>
    </td>
</tr>
