<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Leads Manager — Agency CRM</title>
    <link rel="stylesheet" href="/static/css/leads.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/htmx/1.9.6/htmx.min.js"></script>
</head>

<body>
    <header class="top-bar">
        <div class="top-bar-inner">
            <h1 class="logo">Rankernet's <span>LeadsPilot</span></h1>

            <input type="checkbox" id="nav-toggle" class="nav-toggle-checkbox sr-only">
            <label for="nav-toggle" class="nav-toggle-label">
                <span class="hamburger-icon">☰</span>
            </label>

            <nav class="top-nav">
                <label for="llm-provider" class="sr-only">LLM Provider</label>
                <select id="llm-provider" class="nav-select" aria-label="Select LLM Provider">
                    <option value="gemini">Gemini (Google)</option>
                    <option value="openai">OpenAI (GPT-4o)</option>
                    <option value="anthropic">Anthropic (Claude)</option>
                    <option value="cohere">Cohere</option>
                    <option value="mistral">Mistral</option>
                    <option value="groq">Groq</option>
                    <option value="together">Together AI</option>
                    <option value="replicate">Replicate</option>
                    <option value="huggingface">HuggingFace</option>
                    <option value="perplexity">Perplexity</option>
                    <option value="ollama">Ollama (Local URL)</option>
                </select>
                <label for="llm-api-key" class="sr-only">API Key</label>
                <input type="password" id="llm-api-key" class="nav-input nav-input-wide"
                    placeholder="Enter API Key or Host URL" aria-label="API Key or Host URL" value="{{.LLMAPIKey}}">
                <label for="llm-model" class="sr-only">Model Name</label>
                <input type="text" id="llm-model" class="nav-input" placeholder="Model (Optional)"
                    aria-label="Model Name" value="{{.LLMModel}}">
            </nav>
        </div>
    </header>

    <main class="main-container">
        <!-- Stats Row -->
        <section class="stats-row" id="stats-row" hx-get="/api/stats" hx-trigger="load, every 30s" hx-swap="innerHTML">
            <div class="stat-card">
                <span class="stat-value">—</span>
                <span class="stat-label">Total Leads</span>
            </div>
        </section>

        <!-- Views Toggle -->
        <div class="views-toggle-container">
            <div class="views-toggle">
                <button type="button" class="view-btn{{if .ShowNew}} active{{end}}" id="btn-view-new" onclick="switchView('false')">New
                    Leads</button>
                <button type="button" class="view-btn{{if .ShowCalled}} active{{end}}" id="btn-view-called" onclick="switchView('true')">Called
                    Leads</button>
            </div>
        </div>

        <!-- Filters -->
        <section class="card filter-bar">
            <form id="filter-form" hx-get="/lead-rows" hx-target="#leads-tbody" hx-swap="innerHTML" hx-trigger="submit"
                hx-push-url="false" hx-indicator="#table-spinner">
                <input type="hidden" name="is_called" id="filter-is-called" value="{{.IsCalled}}">
                <div class="filter-row">
                    <input type="text" name="search" id="filter-search" placeholder="🔍 Search leads..."
                        class="filter-input filter-input-wide" value="{{.Search}}" />
                    <label for="filter-city" class="sr-only">Filter by City</label>
                    <select name="city" id="filter-city" class="filter-input" aria-label="Filter by City">
                        <option value="">All Cities</option>
                        {{range .CityGroups}}
                        <optgroup label="{{.Label}}">
                            {{range .Options}}
                            <option value="{{.Value}}"{{if .Selected}} selected{{end}}>{{.Value}}</option>
                            {{end}}
                        </optgroup>
                        {{end}}
                    </select>
                    <label for="filter-category" class="sr-only">Filter by Category</label>
                    <select name="category" id="filter-category" class="filter-input" aria-label="Filter by Category">
                        <option value="">All Categories</option>
                        {{range .CategoryGroups}}
                        <optgroup label="{{.Label}}">
                            {{range .Options}}
                            <option value="{{.Value}}"{{if .Selected}} selected{{end}}>{{.Value}}</option>
                            {{end}}
                        </optgroup>
                        {{end}}
                    </select>
                    <label for="filter-tag" class="sr-only">Filter by Tag</label>
                    <select name="tag" id="filter-tag" class="filter-input" aria-label="Filter by Service Tag">
                        <option value="">All Tags</option>
                        {{range .TagOptions}}
                        <option value="{{.Value}}"{{if .Selected}} selected{{end}}>{{.Value}}</option>
                        {{end}}
                    </select>
                    <button type="submit" class="btn-filter">Filter</button>
                    <button type="button" class="btn-filter-clear" onclick="clearFilters()">Clear</button>
                </div>
            </form>
        </section>

        <!-- Leads Table -->
        <section class="card table-section">
            <div class="table-header">
                <h2 class="section-title">Leads</h2>
                <div id="table-spinner" class="spinner"></div>
            </div>
            <div class="table-responsive">
                <table class="leads-table leads-table-cards" id="leads-table">
                    <thead class="sr-only">
                        <tr>
                            <th>Lead Details</th>
                        </tr>
                    </thead>
                    <tbody id="leads-tbody" hx-get="{{.InitialLeadRowsURL}}" hx-trigger="load" hx-swap="innerHTML"
                        hx-indicator="#table-spinner">
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Result Modal -->
    <div class="modal-overlay" id="result-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title">Result</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modal-body">
                <pre id="modal-pre"></pre>
            </div>
        </div>
    </div>

    <!-- Call Remark Modal -->
    <div class="modal-overlay" id="call-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Record Call Result — <span id="call-lead-title"></span></h3>
                <button class="modal-close" onclick="closeCallModal()">&times;</button>
            </div>
            <div class="modal-body call-modal-body">
                <div class="form-group">
                    <label for="caller-name">Who Called?</label>
                    <input type="text" id="caller-name" class="form-input" placeholder="Enter your name" required>
                </div>
                <div class="form-group">
                    <label for="call-remark">Response / Remarks</label>
                    <textarea id="call-remark" class="form-textarea" placeholder="What did they say?"></textarea>
                </div>
                <input type="hidden" id="call-place-id">
            </div>
            <div class="modal-footer">
                <button class="btn-filter-clear" onclick="closeCallModal()">Cancel</button>
                <button class="btn-filter" id="btn-save-call" onclick="submitCallRemark()">Save Remark</button>
            </div>
        </div>
    </div>

    <script>
        // Stats rendering via HTMX (intercept JSON and render)
        document.body.addEventListener('htmx:beforeSwap', function (evt) {
            if (evt.detail.target.id === 'stats-row') {
                try {
                    const data = JSON.parse(evt.detail.xhr.responseText);
                    evt.detail.serverResponse = `
                        <div class="stat-card">
                            <span class="stat-value">${data.total_leads}</span>
                            <span class="stat-label">Total Leads</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-value">${data.with_website}</span>
                            <span class="stat-label">With Website</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-value">${data.with_email}</span>
                            <span class="stat-label">With Email</span>
                        </div>
                        <div class="stat-card">
                            <span class="stat-value">${data.avg_rating > 0 ? data.avg_rating.toFixed(1) : '—'}</span>
                            <span class="stat-label">Avg Rating</span>
                        </div>
                        <div class="stat-card stat-card-warn">
                            <span class="stat-value">${data.flagged_count}</span>
                            <span class="stat-label">⚠ Flagged</span>
                        </div>
                    `;
                } catch (e) {
                    console.error('Stats parse error:', e);
                }
            }
        });

        function clearFilters() {
            document.getElementById('filter-search').value = '';
            document.getElementById('filter-city').value = '';
            document.getElementById('filter-category').value = '';
            document.getElementById('filter-tag').value = '';
            const isCalled = document.getElementById('filter-is-called').value;
            htmx.ajax('GET', '/lead-rows?is_called=' + isCalled, { target: '#leads-tbody', swap: 'innerHTML' });
        }

        function switchView(isCalled) {
            document.getElementById('filter-is-called').value = isCalled;

            // Toggle active class
            document.getElementById('btn-view-new').classList.toggle('active', isCalled === 'false');
            document.getElementById('btn-view-called').classList.toggle('active', isCalled === 'true');

            // Trigger filter submit
            htmx.trigger('#filter-form', 'submit');
        }

        function openCallModal(placeId, leadTitle) {
            document.getElementById('call-place-id').value = placeId;
            document.getElementById('call-lead-title').textContent = leadTitle;
            document.getElementById('call-remark').value = '';
            document.getElementById('call-modal').classList.add('active');

            // Auto-fill caller name if stored in localStorage
            const savedName = localStorage.getItem('callerName');
            if (savedName) {
                document.getElementById('caller-name').value = savedName;
            }
        }

        function closeCallModal() {
            document.getElementById('call-modal').classList.remove('active');
        }

        async function submitCallRemark() {
            const placeId = document.getElementById('call-place-id').value;
            const callerName = document.getElementById('caller-name').value;
            const remark = document.getElementById('call-remark').value;
            const btn = document.getElementById('btn-save-call');

            if (!callerName) {
                alert('Please enter your name');
                return;
            }

            // Save caller name for next time
            localStorage.setItem('callerName', callerName);

            btn.disabled = true;
            btn.textContent = 'Saving...';

            try {
                const resp = await fetch(`/api/leads/${encodeURIComponent(placeId)}/call`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        called_by: callerName,
                        response: remark
                    })
                });

                if (resp.ok) {
                    closeCallModal();
                    // Refresh current view
                    htmx.trigger('#filter-form', 'submit');
                    // Refresh stats since is_called filter might change counts if implemented in stats
                } else {
                    const data = await resp.json();
                    alert('Error: ' + (data.error || 'Failed to save remark'));
                }
            } catch (err) {
                alert('Network error: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Save Remark';
            }
        }

        const appLLMProvider = '{{.LLMProvider}}';

        document.addEventListener('DOMContentLoaded', function () {
            const provider = document.getElementById('llm-provider');
            if (appLLMProvider) {
                provider.value = appLLMProvider;
            }
        });

        // On-demand enrichment actions
        async function runAction(action, placeId, btn) {
            const originalText = btn.textContent;
            btn.textContent = '⏳';
            btn.disabled = true;

            const titles = {
                techstack: '🔧 Tech Stack',
                pagespeed: '⚡ PageSpeed Results',
                screenshot: '📸 Screenshot',
                contacts: '👤 Contacts Found',
                pitch: '✉️ AI Pitch'
            };

            try {
                let url = `/api/enrich/${action}?place_id=${encodeURIComponent(placeId)}`;
                if (action === 'pitch') {
                    const apiKey = document.getElementById('llm-api-key').value;
                    const provider = document.getElementById('llm-provider').value;
                    const modelName = document.getElementById('llm-model').value;
                    url += `&provider=${encodeURIComponent(provider)}`;
                    if (apiKey) {
                        url += `&api_key=${encodeURIComponent(apiKey)}`;
                    }
                    if (modelName) {
                        url += `&model=${encodeURIComponent(modelName)}`;
                    }
                }

                const resp = await fetch(url, {
                    method: 'POST'
                });
                const data = await resp.json();

                if (data.error) {
                    showModal(titles[action] || 'Error', `<div class="modal-error">${data.error}</div>`);
                } else if (action === 'screenshot') {
                    showModal(titles[action], `<img src="${data.url}" class="screenshot-img" alt="Website screenshot" />`);
                } else if (action === 'pitch') {
                    showModal(titles[action], `<div class="pitch-prompt">${data.prompt.replace(/\n/g, '<br>')}</div>
                        <button class="btn-copy" onclick="copyToClipboard(this)" data-text="${encodeURIComponent(data.prompt)}">📋 Copy Prompt</button>`);
                } else if (action === 'contacts') {
                    let html = '<div class="contact-results">';
                    if (data.emails && data.emails.length) html += `<div class="contact-section"><strong>📧 Emails:</strong><ul>${data.emails.map(e => `<li>${e}</li>`).join('')}</ul></div>`;
                    if (data.phones && data.phones.length) html += `<div class="contact-section"><strong>📞 Phones:</strong><ul>${data.phones.map(p => `<li>${p}</li>`).join('')}</ul></div>`;
                    if (data.linkedin_urls && data.linkedin_urls.length) html += `<div class="contact-section"><strong>💼 LinkedIn:</strong><ul>${data.linkedin_urls.map(l => `<li><a href="${l}" target="_blank">${l}</a></li>`).join('')}</ul></div>`;
                    html += '</div>';
                    showModal(titles[action], html);
                } else {
                    showModal(titles[action], `<pre class="result-json">${JSON.stringify(data, null, 2)}</pre>`);
                }
            } catch (err) {
                showModal('Error', `<div class="modal-error">${err.message}</div>`);
            }

            btn.textContent = originalText;
            btn.disabled = false;
        }

        function showModal(title, bodyHTML) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-body').innerHTML = bodyHTML;
            document.getElementById('result-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('result-modal').classList.remove('active');
        }

        function copyToClipboard(btn) {
            const text = decodeURIComponent(btn.dataset.text);
            navigator.clipboard.writeText(text).then(() => {
                btn.textContent = '✅ Copied!';
                setTimeout(() => btn.textContent = '📋 Copy Prompt', 2000);
            });
        }

        // Close modal on backdrop click
        document.getElementById('result-modal').addEventListener('click', function (e) {
            if (e.target === this) closeModal();
        });

        // Close modal on Escape
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>

</html>
